<div class="container-fluid p-0">
  <div class="row m-0">
    <!-- Sidebar lateral (estilo predeterminado) -->
    <div *ngIf="sidebarStyle === 'lateral'" id="sidebar" class="" 
         [ngClass]="{'hidden': !isSidebarVisible}"  
         style="width: 120px; background-color: var(--sidebar-background-color); height: 100vh; border-right: 2px solid black; overflow: hidden;">     
      <app-sidebar [optionsMenu]="optionsMenu" (sidebarToggle)="toggleSidebar()"></app-sidebar>
    </div>

    <!-- Main Content -->
    <div [ngClass]="{'full-width': !isSidebarVisible || sidebarStyle === 'list', 'reduced-width': isSidebarVisible && sidebarStyle === 'lateral'}" 
         class="main-content d-flex flex-column p-0" style="height: 100vh; overflow: hidden;">
      
      <!-- Header with Toggle Button -->
      <app-header 
        (sidebarToggle)="toggleSidebar()"
        [sidebarStyle]="sidebarStyle"
        (sidebarStyleChange)="setSidebarStyle($event)">
      </app-header>
      
      <!-- Área de contenido con sidebar-list superpuesto -->
      <div class="content-area flex-grow-1">
        <!-- Sidebar lista superpuesto -->
        <div *ngIf="sidebarStyle === 'list' && (isSidebarVisible || isListHiding)"
             class="sidebar-list-wrapper"
             [class.sidebar-list-hiding]="isListHiding">
          <app-sidebar-list [optionsMenu]="optionsMenu" (sidebarToggle)="hideSidebarList()"></app-sidebar-list>
        </div>
        <!-- Content (siempre visible detrás) -->
        <div class="router-outlet-container" style="overflow-y: auto; background-color: rgba(218, 218, 221, 0.8); flex-direction: column;">
          <router-outlet></router-outlet>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="col-12 p-0">
        <app-footer></app-footer>
      </div>
    </div>
  </div>
</div>
